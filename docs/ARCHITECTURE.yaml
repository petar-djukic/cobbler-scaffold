id: architecture-cobbler-scaffold
title: Cobbler Scaffold Architecture

overview:
  summary: |
    Cobbler Scaffold is a Go library that automates AI-driven code generation through a
    two-phase loop: measure (propose tasks) and stitch (execute tasks in isolated worktrees).
    Consuming projects import the library, configure it with project-specific paths and templates,
    and expose its methods as Mage targets.

    The system operates as build tooling, not a standalone application. An Orchestrator struct
    serves as the composition root: it holds a Config and constructs 10 domain structs (Generator,
    Measure, Stitch, Builder, Scaffolder, Comparer, VsCode, Stats, Releaser, Analyzer) plus a
    shared ClaudeRunner infrastructure struct. Each domain struct declares its dependencies
    explicitly via constructor injection. Mage targets call methods on these domain structs
    through the Orchestrator's public fields (e.g., o.Generator.GeneratorStart()). The domains
    coordinate git branch management, Claude invocation (host CLI or Go Agent SDK — selected
    by cobbler.mode in configuration.yaml), issue tracking (GitHub Issues via gh CLI), metrics
    collection, and project scaffolding.

  lifecycle: |
    Generations are the primary unit of work. A generation starts from a tagged main state,
    creates a branch, runs measure-stitch cycles, and merges the result back to main.

    States: created (branch exists, sources reset) -> running (cycles in progress) ->
    finished (tagged, ready to merge) -> merged (on main, branch deleted). An alternative
    terminal state is abandoned (generation was never merged).

    The generation branch name follows the pattern {GenPrefix}{suffix}. When generation.name
    is set, the suffix is the configured name (e.g., "gh-42"); otherwise, it is a timestamp
    formatted as 2006-01-02-15-04-05. Tags mark lifecycle events: {branch}-start,
    {branch}-finished, {branch}-merged, {branch}-abandoned.

  coordination_pattern: |
    The cobbler workflow has two phases that run in sequence within each cycle.

    Measure reads the project state (documentation, existing issues, source code) and invokes
    Claude with a prompt template. Claude proposes tasks as a YAML list. We import these tasks
    as GitHub issues labelled by generation.

    Stitch picks ready GitHub issues one at a time. For each task: create a git worktree
    on a task branch, invoke Claude with the task description and full project context, commit
    Claude's changes (the orchestrator manages all git operations), merge the task branch back,
    record metrics, close the issue. Task branches use the pattern task/{baseBranch}-{issueID}.

    Each stitch task runs in a separate git worktree. This prevents concurrent tasks from
    interfering with each other and keeps the generation branch clean. The worktree lives in
    a temp directory ($TMPDIR/{repoName}-worktrees/{issueID}). After Claude completes, we
    merge the task branch into the generation branch and remove the worktree.

    Recovery handles interrupted runs. On resume, we scan for stale task branches, remove
    them, reset their issues to ready, and continue.

    The system supports two paths for turning a GitHub issue into merged code. The automated
    path uses the generation lifecycle: `mage generator:start` creates the generation branch,
    `mage generator:run` drives measure+stitch cycles autonomously until all issues are closed,
    and `mage generator:stop` merges the result back to the base branch. This path suits
    well-specified epics where human review between tasks is not needed.

    The interactive path uses the /git-issue-pop command: Claude reads the parent issue and
    decomposes it into GitHub sub-issues, a worktree is created for the epic branch, and the
    agent executes each sub-issue with /do-work. This path suits tasks where human review of
    the decomposition or intermediate work is valuable. Both paths share the same GitHub issue
    model and git worktree isolation.

    The YAML specification pipeline (PRDs, use cases, test suites) serves as a semantic model
    in the sense of Fowler's Domain-Specific Languages: the specs encode behavioral intent,
    Claude "compiles" them into code, and `mage analyze` acts as the type checker validating
    model completeness before generation. See eng09-specification-as-semantic-model for the
    full treatment of this analogy and its limits.

interfaces:
  - name: Orchestrator and Config
    summary: |
      The Orchestrator is the composition root. Consuming projects place a configuration.yaml
      at the repository root and call NewFromFile(), or construct a Config in Go and pass it
      to New(). The constructor builds 10 domain structs and a shared ClaudeRunner, wiring
      all dependencies via constructor injection. Mage targets access domain structs through
      public fields (e.g., o.Generator.GeneratorStart()). Config holds all orchestrator
      settings; the YAML file is the sole source of truth for all options.
    data_structures:
      - "Orchestrator: composition root holding Config and 10 domain struct fields (Generator, Measure, Stitch, Builder, Scaffolder, Comparer, VsCode, Stats, Releaser, Analyzer) plus ClaudeRunner"
      - "Config: all orchestrator settings with YAML tags (see prd001-orchestrator-core for full field spec)"
      - "InvocationRecord: metrics per Claude invocation (Caller, StartedAt, DurationS, Tokens, LOCBefore, LOCAfter, Diff, NumTurns)"
      - "HistoryStats: YAML-serializable per-invocation stats saved to history directory (Caller, TaskID, TaskTitle, StartedAt, Duration, Tokens, CostUSD, LOCBefore, LOCAfter, Diff, NumTurns, DurationAPIMs, RateLimitWaitS, SessionID)"
    operations:
      - "New(cfg Config) *Orchestrator: construct composition root, wire all domain structs"
      - "NewFromFile(path string) (*Orchestrator, error): construct from configuration.yaml"
      - "Config(), Tracker(), Git(): accessor methods for config, tracker, git interfaces"
      - "DumpMeasurePrompt(): write measure prompt to stdout for debugging"
      - "DumpStitchPrompt(): write stitch prompt to stdout for debugging"
      - "TokenStats(): enumerate context files and report token counts (prd005)"
      - "PrintContextFiles(): list files included in Claude prompts with sizes"
      - "ConstitutionPreviewFile(): render constitution YAML to markdown"
      - "GeneratorInit(): package-level function to initialize generator state from configuration.yaml"
      - "WriteDefaultConfig(): package-level function to write a default configuration.yaml file"

  - name: Generation Lifecycle
    summary: |
      The Generator struct manages the generation lifecycle. It composes Measure, Stitch,
      Analyzer, Releaser, and ClaudeRunner to coordinate branch creation, measure-stitch
      cycles, merge, and cleanup. Dependencies are injected via NewGenerator(o *Orchestrator).
    data_structures:
      - "Generator: standalone struct with cfg, logf, git, tracker, claudeRunner, analyzer, measure, stitch, releaser, setGeneration, clearGeneration"
    operations:
      - "GeneratorStart(): tag base branch, create generation branch, reset sources unless preserve_sources is true (prd002)"
      - "GeneratorRun(cycles int): run measure+stitch cycles until all issues are closed (prd002)"
      - "GeneratorResume(): recover and continue interrupted run (prd002)"
      - "GeneratorStop(): merge generation into base branch, tag, clean up (prd002)"
      - "GeneratorReset(): destroy all generations, return to clean main (prd002)"
      - "GeneratorList(): show active and past generations (prd002)"
      - "GeneratorSwitch(): switch between generation branches (prd002)"
      - "RunCycles(label string): run measure+stitch cycles until no open issues remain (prd002)"
      - "Init(): initialize project (prd001)"
      - "FullReset(): reset cobbler and generator (prd001)"

  - name: Measure Workflow
    summary: |
      The Measure struct builds the measure prompt from existing issues and project state,
      invokes Claude, parses YAML output, and creates GitHub Issues with dependency labels.
      Dependencies are injected via NewMeasure(o *Orchestrator), including function references
      for orchestrator state (setPhase, setGeneration) and generator helpers (resolveBranch,
      ensureOnBranch, enterWorktree).
    data_structures:
      - "Measure: standalone struct with cfg, logf, git, tracker, claudeRunner, analyzer, plus state callbacks and generator helper functions"
    operations:
      - "Measure(): enter generation worktree and run measure (prd003)"
      - "MeasurePrompt(): print assembled measure prompt to stdout"
      - "RunMeasure(): run measure phase with full lifecycle (prd003)"
      - "buildMeasurePrompt(): assemble measure prompt from project context"
      - "importIssues(): import Claude-proposed tasks as GitHub Issues"

  - name: Stitch Workflow
    summary: |
      The Stitch struct picks ready GitHub Issues, creates worktrees, invokes Claude, commits
      changes, merges branches, and closes tasks. Dependencies are injected via
      NewStitch(o *Orchestrator), including function references for generator helpers
      (pickTask, createWorktree, mergeBranch, cleanupWorktree).
    data_structures:
      - "Stitch: standalone struct with cfg, logf, git, tracker, claudeRunner, plus state callbacks and generator helper functions"
    operations:
      - "Stitch(): enter generation worktree and run stitch (prd003)"
      - "RunStitch(): run stitch phase, executing all ready tasks (prd003)"
      - "RunStitchN(limit int): run stitch phase up to limit tasks (prd003)"
      - "doOneTask(): execute a single task in a worktree"
      - "resetTask(): reset a failed task to ready"
      - "skipTask(): mark a task as skipped after retry limit"

  - name: Builder
    summary: |
      The Builder struct provides build, lint, install, clean, and credential operations.
      It depends only on Config. Created via NewBuilder(cfg Config).
    operations:
      - "Build(): go build the consuming project binary"
      - "BuildAll(): go build all cmd/ sub-packages when MainPackage is empty (prd003)"
      - "Lint(): run golangci-lint on the project"
      - "Install(): go install the project binary"
      - "Clean(): remove build artifacts"
      - "ExtractCredentials(): extract Claude credentials from macOS Keychain"

  - name: Scaffolder
    summary: |
      The Scaffolder struct scaffolds the orchestrator into consuming projects and manages
      test repositories. It depends on git (GitOps) and logf. Created via
      NewScaffolder(git, logf).
    operations:
      - "Scaffold(): scaffold orchestrator into consuming project"
      - "Uninstall(): remove scaffold artifacts from target project"
      - "PrepareTestRepo(): download and scaffold a test repository for E2E tests"

  - name: Stats and Metrics
    summary: |
      The Stats struct collects LOC counts, documentation word counts, generator status,
      release statistics, run statistics, and outcome trailer parsing. It depends on
      cfg, logf, git, and tracker. Created via NewStats(cfg, logf, git, tracker).
    operations:
      - "PrintStats(): print LOC and documentation metrics as YAML (prd005)"
      - "CollectStats(): collect LOC and doc metrics programmatically (prd005)"
      - "GeneratorStats(): print status report for the current generation run (stats:generator)"
      - "ReleaseStats(): print per-release table with PRD counts (stats:releases)"
      - "RunStats(name string): print aggregate statistics for a completed generation run (stats:run)"
      - "CompareRunStats(name1, name2 string): compare two generation runs side by side (stats:compare)"
      - "Outcomes(): parse and display outcome trailers from git history (stats:outcomes)"

  - name: Releaser
    summary: |
      The Releaser struct manages release lifecycle state in road-map.yaml and
      configuration.yaml, and creates versioned documentation tags. It depends only on
      Config. Created via NewReleaser(cfg Config).
    operations:
      - "ReleaseUpdate(version string): mark a release complete — set UC statuses to implemented (release:update)"
      - "ReleaseClear(version string): reverse ReleaseUpdate — reset UC statuses to spec_complete (release:clear)"
      - "Tag(): create versioned doc-release tag, update version file"

  - name: Analyzer
    summary: |
      The Analyzer struct performs cross-artifact consistency checks, code status detection,
      and pre-cycle analysis. It depends on cfg and logf. Created via NewAnalyzer(cfg, logf).
    operations:
      - "Analyze(): cross-artifact consistency checking"
      - "CodeStatus(): report spec-vs-code gaps per use case and release (prd001)"
      - "RunPreCycleAnalysis(): write analysis.yaml before each measure/stitch cycle"
      - "validateDocSchemas(): validate YAML schemas against typed structs"

  - name: Comparer
    summary: |
      The Comparer struct runs cross-generation differential comparison between binary
      sources. It depends on logf and git. Created via NewComparer(logf, git).
    operations:
      - "Compare(): differential comparison between two git references (prd004)"
      - "ResolverFromArg(): resolve a BinaryResolver from argument string"

  - name: VsCode Manager
    summary: |
      The VsCode struct manages VS Code extension packaging and installation. It depends
      only on logf. Created via NewVsCode(logf).
    operations:
      - "VscodePush(): build, package, and install VS Code extension"
      - "VscodePop(): uninstall VS Code extension"

  - name: Claude Runner
    summary: |
      The ClaudeRunner struct encapsulates all Claude execution infrastructure shared by
      Measure and Stitch: running Claude (CLI or SDK mode), capturing LOC, saving history
      artifacts, checking credentials, and detecting open issues. Dependencies are injected
      via NewClaudeRunner(cfg, git, tracker, sdkQueryFn, logf, extractCredentials, collectStats).
      Cross-domain dependencies (extractCredentials from Builder, collectStats from Stats) are
      passed as function references to avoid circular struct dependencies.
    data_structures:
      - "ClaudeRunner: standalone struct with cfg, git, tracker, sdkQueryFn, logf, extractCredentials, collectStats"
    operations:
      - "runClaude(): execute Claude and return token usage"
      - "runMeasureClaude(): execute Claude with measure-specific idle timeout"
      - "runClaudeSDK(): execute Claude via Go Agent SDK"
      - "checkClaude(): verify Claude can be invoked"
      - "captureLOC(): snapshot current Go LOC counts"
      - "saveHistoryReport/Stats/Prompt/Log(): save history artifacts"
      - "HistoryClean(): remove history subdirectory"
      - "CobblerReset(): remove cobbler scratch directory"
      - "hasOpenIssues(): check for open orchestrator issues"

  - name: Git Operations
    summary: |
      Abstracts all git operations behind a GitOps interface with six role-based
      sub-interfaces. The ShellGitOps implementation executes git commands via
      exec.Command. Components declare dependencies on the narrowest sub-interface
      they need, enabling testability and future non-shell backends.
    data_structures:
      - "GitOps: primary interface, 33 methods covering all git operations"
      - "RepoReader: read-only access (CurrentBranch, BranchExists, ListBranches, ListTags, LsFiles, RevParseHEAD)"
      - "WorktreeManager: worktree lifecycle (WorktreeAdd, WorktreeRemove, WorktreePrune)"
      - "BranchManager: branch operations (Checkout, CheckoutNew, CreateBranch, DeleteBranch, ForceDeleteBranch, MergeCmd)"
      - "CommitWriter: staging and commits (StageAll, StageDir, UnstageAll, HasChanges, Stash, Commit, CommitAllowEmpty, CommitAmendTrailers, ResetSoft)"
      - "TagManager: tag operations (Tag, TagAt, DeleteTag, RenameTag, ListTags)"
      - "DiffInspector: diff operations (DiffShortstat, DiffNameStatus, LsTreeFiles, ShowFileContent)"
      - "DiffStat: parsed output from git diff --shortstat (FilesChanged, Insertions, Deletions)"
      - "FileChange: per-file diff information (Path, Status, Insertions, Deletions)"
      - "ShellGitOps: implements GitOps using exec.Command"

  - name: Issue Tracking
    summary: |
      Abstracts all issue-tracking operations behind a WorkTracker interface.
      GitHubTracker implements WorkTracker using the gh CLI and GitHub REST API.
      The interface manages issue CRUD, DAG-based dependency promotion, generation
      labelling with 50-char truncation, sub-issue hierarchy, and garbage collection
      of stale generation issues.
    data_structures:
      - "WorkTracker: primary interface, 27 methods for issue lifecycle, labels, DAG promotion, defects"
      - "GitHubTracker: implements WorkTracker using gh CLI and REST API"
      - "CobblerIssue: issue record (Number, Title, State, Index, DependsOn, Generation, Description, Labels)"
      - "ProposedIssue: measure output (Index, Title, Description, Dependency)"
      - "ContextIssue: issue summary for context assembly (ID, Title, Status, Type)"
      - "CobblerFrontMatter: YAML front-matter parsed from issue body (Generation, Index, DependsOn)"
    operations:
      - "DetectGitHubRepo: discover repo from git remote"
      - "EnsureCobblerLabels: create standard cobbler labels"
      - "CreateCobblerIssue: create issue with generation label and dependency front-matter"
      - "ListOpenCobblerIssues: list open issues filtered by generation label"
      - "PromoteReadyIssues: promote unblocked issues to cobbler-ready based on dependency DAG"
      - "PickReadyIssue: pick lowest-numbered ready issue, mark in-progress (excludes cobbler-skipped)"
      - "CloseCobblerIssue: close issue and re-promote dependents"
      - "GcStaleGenerationIssues: garbage-collect stale generation issues in a single bulk API call"
      - "LinkSubIssue: link child issue to parent via GitHub sub-issues API"
      - "FileTargetRepoDefects: file defects in target repos"
      - "GenLabel: truncate/hash generation labels to 50-char GitHub limit"

  - name: Claude Execution
    summary: |
      Abstracts Claude invocation behind a Runner interface. Two implementations
      exist: CLIRunner invokes the claude binary directly on the host, SDKRunner
      uses the Go Agent SDK. The effectiveMode() function selects the implementation
      based on cobbler.mode in configuration.yaml. Both return a ClaudeResult with
      token usage, cost, and session metadata.
    data_structures:
      - "Runner: interface with Run(ctx, prompt, workDir, silence, extraArgs) returning ClaudeResult"
      - "CLIRunner: implements Runner via claude CLI binary"
      - "SDKRunner: implements Runner via Go Agent SDK with sdkEnvMu-serialised env mutation"
      - "ClaudeResult: token usage (InputTokens, OutputTokens, CacheCreationTokens, CacheReadTokens, CostUSD, RawOutput, NumTurns, DurationAPIMs, RateLimitWaitS, SessionID)"

  - name: Binary Resolution
    summary: |
      Abstracts binary resolution for cross-generation differential comparison
      behind a BinaryResolver interface. Three implementations resolve binaries
      from different sources: git tags, GNU coreutils on PATH, and pre-built
      directories. The comparison runner resolves both sides, runs test cases
      from YAML spec test suites, and reports differences.
    data_structures:
      - "BinaryResolver: interface with Resolve(utility) and ListUtilities()"
      - "GitTagResolver: builds binaries from git tags into a temp directory"
      - "GNUResolver: resolves Homebrew GNU coreutils via g-prefix convention"
      - "PathResolver: resolves binaries from PATH"
      - "CompareTestCase: test case loaded from YAML test suite (Input, Expected)"
      - "TestResult: per-test pass/fail with diff details"

  - name: Prompt Templates
    summary: |
      Prompts are Go text/template strings embedded from pkg/orchestrator/prompts/measure.tmpl
      and pkg/orchestrator/prompts/stitch.tmpl. Consuming projects can override them via
      Config.MeasurePrompt and Config.StitchPrompt. Prompts are injected with phase-specific
      constitutions (planning for measure, execution for stitch) and a ProjectContext YAML blob
      containing all docs, specs, source code, and existing issues.
    data_structures:
      - "MeasurePromptDoc: Role (string), ProjectContext (*ProjectContext), PlanningConstitution (*yaml.Node), IssueFormatConstitution (*yaml.Node), Task (string), Constraints (string), OutputFormat (string), GoldenExample (string), AdditionalContext (string), ValidationErrors ([]string), PackageContracts ([]OODPackageContractRef)"
      - "StitchPromptDoc: Role (string), RepositoryFiles ([]string), ProjectContext (*ProjectContext), Context (string), ExecutionConstitution (*yaml.Node), GoStyleConstitution (*yaml.Node), Task (string), Constraints (string), Description (string), SemanticModel (*yaml.Node), SharedProtocols ([]ArchSharedProtocol), PackageContracts ([]OODPackageContractRef)"

  - name: Context Assembly
    summary: |
      Builds a comprehensive YAML blob (ProjectContext) from the consuming project's
      documentation, specifications, source code, and existing issues. Over 30 struct
      types model the document schema. Phase-specific context files override global
      context settings at invocation time. The assembled context is injected into
      both measure and stitch prompts.
    data_structures:
      - "ProjectContext: top-level container (Vision, Architecture, Specifications, Roadmap, Specs, Engineering, Analysis, SourceCode, Issues, CompletedWork, RequirementStates, Extra)"
      - "PhaseContext: per-phase overrides (Include, Exclude, Sources, Release, ExcludeSource, SourcePatterns, ExcludeTests, SourceMode, SummarizeCommand)"
      - "VisionDoc, ArchitectureDoc, SpecificationsDoc, RoadmapDoc: top-level document types"
      - "PRDDoc: product requirement with RequirementGroups, AcceptanceCriteria, ImplementedBy, UsedBy"
      - "PRDRequirementItem: individual requirement (ID, Text, Weight)"
      - "UseCaseDoc: use case with SuccessCriteria, InteractionSteps, Touchpoints"
      - "TestSuiteDoc: test suite with TestCases"
      - "SourceFile: Go source file (File, Lines)"

components:
  - name: Orchestrator
    responsibility: |
      Composition root. Holds Config, provides New() and NewFromFile() constructors, manages
      logging with optional generation tagging. Constructs and wires 10 domain structs
      (Generator, Measure, Stitch, Builder, Scaffolder, Comparer, VsCode, Stats, Releaser,
      Analyzer) and a shared ClaudeRunner via constructor injection. Domain structs are
      exposed as public fields. Only accessor and cross-domain utility methods remain on
      the Orchestrator itself.
    capabilities:
      - Construct from Config or configuration.yaml file
      - Wire all domain structs through constructor injection
      - Provide accessor methods for Config, Tracker, Git
      - Host cross-domain utilities (DumpMeasurePrompt, DumpStitchPrompt, TokenStats, PrintContextFiles, ConstitutionPreviewFile)
    references:
      - prd001-orchestrator-core

  - name: Generator
    responsibility: |
      Standalone Generator struct managing the generation lifecycle. Composes Measure, Stitch,
      Analyzer, Releaser, and ClaudeRunner. Creates generation branches, runs cycles, merges
      results to the base branch, handles resume from interrupted runs. Uses git tags to mark
      lifecycle events. Resets Go sources and re-seeds template files on start and reset,
      unless generation.preserve_sources is true (library mode). Created via NewGenerator(o).
    capabilities:
      - Start, run, resume, stop, reset, list, switch generation branches
      - Tag lifecycle events on git
      - Re-seed template files at start and reset (skipped in library mode)
      - "Library mode: preserve Go source files when preserve_sources is true (prd002 R10)"
      - Stop cleanly when only cobbler-skipped tasks remain (GH-1699)
      - Handle rate limits separately from task failures — rate-limit waits do not count as task retries (GH-1805)
      - Commit specs-only cleanup to generation branch before merge (GH-1876)
      - Block auto-advance when release has ready requirements in requirements.yaml (GH-1952)
    references:
      - prd002-generation-lifecycle

  - name: Cobbler - Measure
    responsibility: |
      Standalone Measure struct. Builds the measure prompt from existing issues and project
      state, invokes Claude, parses the YAML output, and creates GitHub Issues with dependency
      labels via the gh CLI. Records invocation metrics. Saves history artifacts (prompt, log,
      issues, stats) per iteration to the configured history directory. Created via
      NewMeasure(o), with orchestrator state callbacks and generator helpers passed as
      function references.
    capabilities:
      - Build measure prompt from MeasurePromptDoc with full ProjectContext
      - Parse Claude YAML output into task list
      - Create GitHub Issues for proposed tasks with dependency labels
      - Reject proposed tasks for out-of-scope releases (hard filter, GH-1703)
      - "Strip [stitch] prefix from measure-proposed titles before import (GH-1953)"
      - Enforce MinMeasureIssues — re-prompt when too few tasks are proposed and unresolved requirements exist (GH-1882)
      - Validate requirement weight per task against MaxWeightPerTask (GH-1951)
      - Include per-requirement completion status in measure prompt code status (GH-1948)
      - Match bare PRD references in touchpoints for release advance check (GH-1960)
      - Save history artifacts per iteration
    references:
      - prd003-cobbler-workflows

  - name: Cobbler - Stitch
    responsibility: |
      Standalone Stitch struct. Picks ready GitHub Issues, creates worktrees, invokes Claude,
      commits Claude's changes (the orchestrator manages all git operations — Claude is
      forbidden from running git commands), merges branches, records metrics, and closes tasks.
      Saves history artifacts (prompt, log, stats) per task. Handles recovery of stale tasks
      from interrupted runs. Created via NewStitch(o), with generator helpers passed as
      function references.
    capabilities:
      - Create git worktree per task on a dedicated branch
      - Invoke Claude in worktree context with full ProjectContext
      - Commit worktree changes and merge task branch
      - Record metrics and save history artifacts per task
      - Recover stale tasks on resume
      - Skip tasks that exceed the retry limit (cobbler-skipped label) instead of halting the generation (GH-1699)
      - Sweep open tasks after each close, auto-closing any whose R-items are already complete (GH-1647)
      - Track requirement weight in batching and validation (GH-1832)
    references:
      - prd003-cobbler-workflows

  - name: Cobbler Common
    responsibility: |
      Standalone ClaudeRunner struct encapsulating Claude execution infrastructure shared by
      Measure and Stitch. Claude invocation (runClaude dispatches to CLI or SDK based on
      effectiveMode()), token parsing, LOC capture, invocation recording, history artifact
      saving, progress logging, configuration logging, and worktree path management. The
      progressWriter logs real-time Claude stream events (tool calls, turns, timing) with
      claude: prefix for clear log attribution. Created via NewClaudeRunner with cross-domain
      deps (extractCredentials from Builder, collectStats from Stats) passed as function
      references.
    capabilities:
      - Dispatch Claude invocation to CLI or SDK mode via effectiveMode()
      - Invoke claude binary directly on host (cli mode)
      - Invoke Claude via Go Agent SDK with sdkEnvMu-serialised env mutation (sdk mode)
      - Filter SDK stderr to replace rate_limit_event warnings with structured log entries (filterSDKStderr)
      - Capture and parse token usage from Claude stream-json or SDK result output
      - Capture SDK metadata (NumTurns, DurationAPIMs, SessionID) from ResultMessage
      - Track rate-limit wait time separately from task failures (RateLimitWaitS, GH-1805)
      - Snapshot LOC before and after Claude
      - Save history artifacts (prompt, log, stats YAML) to configurable directory
      - Log real-time Claude progress (turns, tool calls, timing)
      - Append outcome trailers to commits via injected gitops function (CommitAmendTrailersFn)
    references:
      - prd003-cobbler-workflows
      - prd005-metrics-collection

  - name: Commands
    responsibility: |
      Wrapper functions for external tools. Functions wrapping git and Go CLI commands.
      Centralizes binary names as constants and provides structured access to command
      output.
    capabilities:
      - Git operations (branch, worktree, tag, merge, diff)
      - Go toolchain operations (build, vet)
    references:
      - prd001-orchestrator-core

  - name: GitOps
    responsibility: |
      Defines a GitOps interface that abstracts all git operations (checkout, branch
      creation, tagging, pushing, committing, worktree management, diff stats). The
      ShellGitOps implementation executes git commands via exec.Command. The interface
      enables testing with mock implementations and future non-shell backends.
    capabilities:
      - "GitOps interface: 50+ git operations (Checkout, CreateBranch, DeleteBranch, Tag, Push, Commit, CommitAmendTrailers, Merge, Worktree, DiffStat, etc.)"
      - "Role-based sub-interfaces: RepoReader, WorktreeManager, BranchManager, CommitWriter, TagManager, DiffInspector"
      - "ShellGitOps: implements GitOps using exec.Command"
      - "DiffStat: parsed output from git diff --shortstat (FilesChanged, Insertions, Deletions)"
      - "FileChange: per-file diff information"
    references:
      - prd001-orchestrator-core

  - name: GitHub Issues
    responsibility: |
      Manages GitHub Issues as the task tracker for cobbler workflows. Defines a
      WorkTracker interface that abstracts all issue-tracking operations (create, list,
      close, label, promote, GC). GitHubTracker implements WorkTracker using the gh CLI
      and GitHub REST API. The interface enables future alternative implementations
      (e.g., crumbs/trails). Provides DAG-based promotion of ready issues and garbage
      collection of stale generation issues whose branches no longer exist locally.
    capabilities:
      - "WorkTracker interface: DetectGitHubRepo, EnsureCobblerLabels, CreateCobblerIssue, ListOpenIssues, PromoteReadyIssues, PickReadyIssue, CloseIssue, GarbageCollect, FileDefect"
      - "GitHubTracker: implements WorkTracker using gh CLI and REST API"
      - "Create cobbler issues with YAML front-matter (generation, index, dependency) and [measure] title prefix"
      - List open issues filtered by generation label via REST API
      - Promote unblocked issues to cobbler-ready based on dependency DAG
      - Pick lowest-numbered ready issue and mark in-progress (excludes cobbler-skipped issues)
      - Close issues and re-promote dependents
      - Garbage-collect stale generation issues in a single bulk API call
      - Close orphaned measuring placeholders with an explanatory comment on Claude failure (GH-747)
      - "Sub-issue hierarchy: generation → measure → stitch (FinalizeMeasurePlaceholder links measure to generation parent, stitch issues link to measure)"
      - "GenLabel: truncate/hash generation labels to 50-char GitHub limit"
      - File defects in target repos
    references:
      - prd003-cobbler-workflows
      - Design decision 5 (GitHub Issues for task tracking)

  - name: Stats
    responsibility: |
      Standalone Stats struct. Collects Go LOC counts (production and test) and documentation
      word counts. Uses the configured GoSourceDirs and SpecGlobs. Output feeds invocation
      records and the mage stats target. Run statistics aggregate per-generation-run metrics
      from history artifacts, and cross-generation comparison places two runs side by side.
      Created via NewStats(cfg, logf, git, tracker).
    capabilities:
      - Count Go LOC by production and test files
      - Count documentation words by glob pattern
      - Aggregate per-generation-run statistics from history artifacts (RunStats)
      - Compare two generation runs side by side (CompareRunStats)
    references:
      - prd005-metrics-collection

  - name: Analyze
    responsibility: |
      Standalone Analyzer struct. Cross-artifact consistency checking. Validates that PRDs,
      use cases, and test suites are properly linked and complete. Reports orphaned PRDs,
      missing test suites, broken touchpoints, use cases not in the roadmap, schema drift,
      and semantic model violations. Validates structured traceability chains: R-items covered
      by acceptance criteria (ACs), ACs covered by test cases, and use case success criteria
      (S-items) traced to PRD ACs. Created via NewAnalyzer(cfg, logf).
    capabilities:
      - Load and index all PRDs, use cases, test suites, and roadmap entries
      - Check PRD-to-use-case traceability via touchpoints
      - Check use-case-to-test-suite linkage
      - Identify orphaned artifacts and broken references
      - Validate YAML schemas against typed structs (strict field checking)
      - Detect constitution drift between docs/constitutions/ and embedded copies
      - Validate semantic models — SM1 (four required sections), SM3 (feature source traceability), SM7 (name/semver) — in standalone files, PRD shorthand, and prompt full-format
      - "Validate structured acceptance criteria: AcceptanceCriterion (id, criterion, traces) in PRDs"
      - "Validate structured success criteria: SuccessCriterion (id, criterion, traces) in use cases"
      - "Check R-item coverage by ACs, AC coverage by test cases, S-item trace validity"
      - "Warn on R-items without explicit weight annotation (MissingWeights, GH-1946)"
      - "Warn on touchpoints citing PRDs without R-group references (BareTouchpoints, GH-1961)"
      - "Detect use case ID prefix vs. roadmap release mismatch (UCIDPrefixMismatch, GH-1964)"
      - "Validate PRD implemented_by/used_by references resolve to ARCHITECTURE.yaml interface names (BrokenInterfaceRefs, GH-1968)"
      - Generate detailed consistency report with artifact counts
    references:
      - Similar to spec-kit analyze functionality

  - name: Config
    responsibility: |
      Config struct with YAML tags, LoadConfig() for reading configuration.yaml, SeedData
      template data, Silence() and EffectiveTokenFile() helpers, and applyDefaults() for
      zero-value fields. CobblerConfig includes MinMeasureIssues (minimum tasks measure
      must propose when unresolved requirements exist), MaxRequirementsPerTask (maximum
      requirements per task), and MaxWeightPerTask (maximum total weight per task, derived
      from MaxRequirementsPerTask when unset per GH-1951).
    capabilities:
      - Load and validate configuration.yaml
      - Apply defaults to zero-value fields
      - Resolve SeedFiles and prompt paths to content
      - Derive MaxWeightPerTask from MaxRequirementsPerTask when unset (GH-1951)
    references:
      - prd001-orchestrator-core

  - name: Scaffold
    responsibility: |
      Standalone Scaffolder struct. Scaffolds the orchestrator into consuming projects. Detects
      project structure (module path, binary name, main package, source directories), generates
      a configuration.yaml with detected values, writes a magefiles/orchestrator.go template,
      copies constitution files, and wires go.mod with the correct module dependency. Also
      provides Uninstall() to remove scaffold artifacts and PrepareTestRepo() for E2E test
      setup. Created via NewScaffolder(git, logf).
    capabilities:
      - Detect module path, binary name, main package, and source directories from existing project structure
      - Generate configuration.yaml with detected values and defaults
      - Write magefiles/orchestrator.go from embedded template
      - Copy design constitution to consuming project
      - Wire go.mod dependency with local replace for development or published version
      - Remove scaffold artifacts (Uninstall)
      - Download and scaffold test repos from published modules (PrepareTestRepo)
    references:
      - eng03-project-initialization

  - name: Context Assembly
    responsibility: |
      Builds a comprehensive YAML blob (ProjectContext) from the consuming project's
      documentation, specifications, source code, and existing issues. This context is
      injected into both measure and stitch prompts so Claude sees the full project state.
      Over 30 struct types model the document schema (VisionDoc, ArchitectureDoc, PRDDoc,
      UseCaseDoc, TestSuiteDoc, EngineeringDoc, ConstitutionsDoc, SourceFile, etc.).

      Phase-specific context files (measure_context.yaml and stitch_context.yaml) in the
      cobbler scratch directory override global context settings at invocation time. The
      PhaseContext struct holds include, exclude, sources, release, exclude_source,
      source_patterns, exclude_tests, source_mode, and summarize_command fields. When a
      phase context file exists, its non-empty fields replace the corresponding ProjectConfig
      values before context assembly. When absent, Config defaults apply unchanged.
    capabilities:
      - Load and marshal vision, architecture, specifications, roadmap, PRDs, use cases, test suites
      - Load engineering guidelines and constitutions
      - Load Go source files from configured directories
      - Parse existing GitHub issues into structured format
      - Assemble all components into a single YAML string for prompt injection
      - Load per-phase context override files (PhaseContext) at invocation time
      - "LoadPRDSemanticModel: scan PRD files for semantic_model field, return as raw YAML node for stitch prompt injection"
    references:
      - prd003-cobbler-workflows (prompt building, R9 phase context)
      - eng08-phase-context-files

  - name: Logging
    responsibility: |
      Phase-aware structured logging to stderr. logf() is an Orchestrator method that includes
      timestamp, generation name (when set via setGeneration), and phase name with elapsed
      time (when set via setPhase). Logging state (phaseMu, currentGeneration, currentPhase,
      logSink) is held on the Orchestrator instance. Domain structs receive logf and state
      callbacks (setPhase, clearPhase, setGeneration, clearGeneration) via constructor
      injection. Generation tagging is set by the Generator lifecycle and auto-set by
      Measure/Stitch when called directly.
    capabilities:
      - Timestamped log lines with optional generation and phase tags
      - Phase-relative elapsed time tracking
      - Automatic generation tagging from branch name

  - name: Constitutions
    responsibility: |
      Seven YAML constitutions govern different workflow phases. Design, planning, and execution
      are the three primary constitutions aligned to workflow phases. Go-style, issue-format,
      testing, and interface provide supplementary rules for specific concerns. Design and
      interface constitutions are scaffolded to consuming projects. All others are embedded
      in the binary and injected into prompts or analysis as needed. constitution_md.go
      provides ConstitutionToMarkdown() and ConstitutionPreviewFile() to render any YAML
      constitution to markdown for human inspection.
    capabilities:
      - Design constitution (design.yaml) defines documentation standards, format schemas, and traceability model
      - Planning constitution (planning.yaml) defines release priority, task sizing, and issue structure
      - Execution constitution (execution.yaml) defines coding standards, design patterns, and session completion
      - Go-style constitution (go-style.yaml) defines Go coding conventions, injected into stitch prompts as GoStyleConstitution; includes write-first-compile-later guidance (GH-1954)
      - Issue-format constitution (issue-format.yaml) defines task issue structure, injected into measure prompts as IssueFormatConstitution
      - Testing constitution (testing.yaml) defines test writing standards, injected into analysis
      - Interface constitution (interface.yaml) defines interface declaration, naming, PRD reference conventions (I1-I6), and analysis validation rules for implemented_by/used_by traceability (GH-1968)
      - ConstitutionToMarkdown converts a constitution's sections slice to markdown
      - ConstitutionPreviewFile reads a constitution YAML file and prints rendered markdown to stdout
    references:
      - Design decision 8 (three-phase constitution architecture)

  - name: Pre-Cycle Analysis
    responsibility: |
      Runs cross-artifact consistency checks and code status detection before each
      measure/stitch cycle. Writes the combined result as analysis.yaml into the cobbler
      scratch directory so Claude sees the current project health in both measure and
      stitch prompts. Errors are advisory — they are logged but do not block the cycle.
    capabilities:
      - Run cross-artifact consistency checks and collect details into AnalysisDoc
      - Run code status detection (roadmap spec status vs test file presence)
      - Marshal and write AnalysisDoc to {ScratchDir}/analysis.yaml
      - Load analysis.yaml for inclusion in ProjectContext
    references:
      - prd003-cobbler-workflows

  - name: Prompt Builder
    responsibility: |
      Defines the typed document structures for measure and stitch prompts
      (MeasurePromptDoc and StitchPromptDoc) and the shared promptTemplate parser.
      Provides parseYAMLNode and substitutePlaceholders utilities used when assembling
      prompts from configuration and template files.
    capabilities:
      - Define MeasurePromptDoc and StitchPromptDoc as YAML-serializable prompt envelopes
      - Parse prompt template YAML files into promptTemplate structs
      - Validate prompt template files for schema conformance
      - Substitute {key} placeholders in template text
    references:
      - prd003-cobbler-workflows

  - name: Code Status
    responsibility: |
      Implements the CodeStatus() method (exposed as mage status). Scans the tests/
      directory for per-use-case test subdirectories, compares presence of _test.go
      files against roadmap spec status, and reports gaps where a use case is marked
      done in road-map.yaml but has no test coverage.
    capabilities:
      - Scan tests/rel*/uc* directories for _test.go files
      - Compute per-release and per-use-case implementation status
      - Detect spec-vs-code gaps and report them
      - Write CodeStatusReport into AnalysisDoc for pre-cycle context
    references:
      - prd001-orchestrator-core

  - name: Cross-Generation Comparison
    responsibility: |
      Builds binaries from two git references (or resolves paths directly) and runs
      test cases loaded from YAML spec test suites to detect behavioral differences
      between implementations. compare.go implements the top-level Compare() method
      and binary build/resolve logic; testloader.go loads CompareTestCase records
      from test suite YAML files and runs them against both binaries.
    capabilities:
      - Resolve binary paths from git tags or local paths
      - Build binaries from git tags into a temp directory
      - Load CompareTestCase records from YAML test suite files
      - Run both binaries with identical inputs and compare stdout, stderr, and exit code byte-for-byte
      - Format and report pass/fail results with diff details and summary counts
    references:
      - prd004-differential-comparison

  - name: Token Stats
    responsibility: |
      Enumerates all files that buildProjectContext would load, grouped by category,
      and reports their byte sizes. Optionally calls the Anthropic Token Counting API
      with the assembled measure prompt to produce an exact token count. Exposes the
      TokenStats() method (mage stats:tokens target).
    capabilities:
      - Enumerate standard documentation, extra context, source code, and prompt template files
      - Classify files by category (docs, source, prompts, extra)
      - Compute per-category and total byte counts
      - Estimate token counts from byte size (len/4 heuristic)
      - Call Anthropic Token Counting API for exact counts when ANTHROPIC_API_KEY is set
    references:
      - prd005-metrics-collection

  - name: Outcomes
    responsibility: |
      Parses outcome trailers from git commit messages written by stitch tasks.
      Trailers record token usage, LOC deltas, cost, and duration per task.
      The Outcomes() method (mage stats:outcomes) scans all branches and prints
      a summary table to stdout.
    capabilities:
      - Parse outcome trailers from git log output
      - Extract branch names from commit ref decorations
      - Format summary table with token counts, cost, LOC deltas, and duration
    references:
      - prd005-metrics-collection

  - name: Release Stats
    responsibility: |
      Loads road-map.yaml, PRD files, and use case touchpoints to produce a
      per-release table showing PRD completion status and requirement counts.
      Determines PRD-to-release mapping via buildPRDReleaseMap (shared with
      GeneratorStats). Exposed as mage stats:releases.
    capabilities:
      - Load roadmap releases with use case statuses
      - Map PRDs to releases via use case touchpoint references
      - Count requirements per PRD from YAML specification files
      - Classify PRDs as complete, started, untouched, or no-requirements
      - Print tabwriter table with release, name, status, PRD counts, requirement counts
    references:
      - prd005-metrics-collection

  - name: Prompt Files
    responsibility: |
      Enumerates all files that buildProjectContext loads, annotated with source
      (default vs config), category, line count, and estimated token count. Mirrors
      the include/exclude logic of context assembly so that stats:tokens and
      prompt:files report the same file set. Exposed as mage prompt:files.
    capabilities:
      - Resolve default and config-driven documentation files with exclusion support
      - Resolve extra context sources and Go source files
      - Print annotated file list with token estimates
    references:
      - prd003-cobbler-workflows
      - prd005-metrics-collection

  - name: VS Code Extension
    responsibility: |
      A TypeScript extension providing editor-integrated visibility into orchestrator state.
      Ten source modules implement six use cases: lifecycle commands, generation browser,
      branch comparison, issue tracker, metrics dashboard, and specification browser. The
      extension activates when configuration.yaml exists in the workspace and monitors
      .git/refs/ and docs/specs/ for changes. Build and install are managed by
      mage vscode:push; uninstall by mage vscode:pop.
    capabilities:
      - Execute lifecycle commands (start, run, resume, stop, reset, switch) via integrated terminal (commands.ts)
      - Display generation tree with lifecycle state from git tags (generationBrowser.ts)
      - Compare version tags and generation branches with file-level diff view (comparisonBrowser.ts)
      - Fetch GitHub Issues via gh CLI and display issues grouped by status (issuesBrowser.ts, issuesModel.ts)
      - Aggregate and display metrics dashboard as webview panel (dashboard.ts)
      - Browse specifications with touchpoint expansion and CodeLens traceability (specBrowser.ts, specModel.ts, traceability.ts)
      - Register extension entry point and wire all providers (extension.ts)
    references:
      - prd006-vscode-extension

design_decisions:
  - id: 1
    title: Library with YAML configuration
    decision: |
      We build a library that consuming projects import, configured via a configuration.yaml
      file at the repository root. Consuming projects call NewFromFile() or construct a Config
      in Go and pass it to New(). The Mage build system provides the CLI interface.
    benefits:
      - configuration.yaml records exactly what options were used, making generations reproducible
      - Consuming projects wire the library into their own magefiles
      - No duplicate flag parsing between the library and consumers
    alternatives_rejected:
      - "Standalone CLI: duplicates configuration concerns; flag values are not recorded so runs are not reproducible"

  - id: 2
    title: Git worktree isolation
    decision: |
      Each stitch task runs in a separate git worktree on its own branch. Worktrees are
      temporary and cleaned up after merge.
    benefits:
      - Concurrent tasks do not interfere with each other
      - Generation branch stays clean; failed tasks leave no partial commits
    alternatives_rejected:
      - "Running Claude on the generation branch directly: risks partial commits and merge conflicts between tasks"

  - id: 3
    title: Two-phase cobbler loop
    decision: |
      We separate task proposal (measure) from task execution (stitch), running them in
      sequence within each cycle.
    benefits:
      - Measure sees full project state before proposing work
      - Tasks can be reviewed between measure and stitch
      - Stitch executes tasks independently of each other
    alternatives_rejected:
      - "Single-phase approach: Claude both proposes and executes, losing the ability to review before execution"

  - id: 4
    title: Pluggable Claude execution mode
    decision: |
      We support two Claude execution modes selected by cobbler.mode in configuration.yaml:
      cli (default) invokes the claude binary directly on the host; sdk uses the Go Agent
      SDK (github.com/schlunsen/claude-agent-sdk-go) for structured streaming.
      effectiveMode() resolves the configured mode and runClaude dispatches to the
      appropriate implementation. SDK mode serialises process-env mutations around each
      invocation via sdkEnvMu.
    benefits:
      - CLI mode works on any host with the claude binary installed
      - SDK mode provides structured streaming and programmatic control
      - Mode is a single configuration field — no code change to switch
    alternatives_rejected:
      - "Podman container execution: removed in favor of direct CLI and SDK modes for simplicity"

  - id: 5
    title: GitHub Issues for task tracking
    decision: |
      We use GitHub Issues as the task tracker. Each generation's tasks are GitHub issues
      labelled with a generation-specific label (cobbler-gen-{branch}). Status is encoded
      as additional labels (cobbler-ready, cobbler-in-progress, cobbler-skipped). The gh CLI
      manages all issue operations via the GitHub REST API.
    benefits:
      - Task state is visible on the GitHub issue page without any local tooling
      - No external binary dependency beyond gh, which is standard in GitHub workflows
      - Issue history and comments are preserved in GitHub's audit trail
      - Parent issues can track sub-issues via GitHub's native sub-issue API
    alternatives_rejected:
      - "Local SQLite issue tracker: state is not visible on GitHub and requires an external binary dependency"
      - "File-based issue directories: no UI, harder to review during code review"

  - id: 6
    title: Embedded prompt templates with override
    decision: |
      Default prompts are embedded in the binary via go:embed. Consuming projects can
      override them through Config.MeasurePrompt and Config.StitchPrompt.
    benefits:
      - Zero-configuration defaults for new consumers
      - Full customizability per project
      - No external file path management required for default behavior
    alternatives_rejected:
      - "External prompt files only: require file path management and increase deployment complexity"

  - id: 7
    title: Recovery on resume
    decision: |
      Generator resume scans for stale task branches, orphaned in-progress issues, and
      leftover worktrees. It cleans all of them up and resets affected tasks to ready
      before continuing the run.
    benefits:
      - Interrupted runs are recoverable without manual intervention
      - No dangling branches or orphaned issues after recovery
    alternatives_rejected:
      - "Requiring manual cleanup after interruption: error-prone and creates friction"

  - id: 8
    title: Three-phase constitution architecture
    decision: |
      Project governance is split into three constitutions aligned with workflow phases:
      (1) Design constitution (design.yaml) scaffolded to consuming projects for interactive
      documentation work; (2) Planning constitution (planning.yaml) embedded in the binary
      and injected into measure prompts; (3) Execution constitution (execution.yaml) embedded
      in the binary and injected into stitch prompts. Each constitution contains only the
      rules relevant to its phase.
    benefits:
      - Measure and stitch agents receive only the rules they need, reducing prompt bloat
      - Design constitution is available in consuming projects without embedding the entire orchestrator
      - Clear separation of concerns between documentation, planning, and implementation phases
      - Constitutions are YAML-structured and machine-parseable
    alternatives_rejected:
      - "Scattered markdown rule files: verbose prose, no phase separation, all rules injected into every prompt"
      - "Single monolithic constitution: measure agents see coding standards they don't need, stitch agents see format schemas they don't need"

  - id: 9
    title: Library mode via preserve_sources
    decision: |
      We add a generation.preserve_sources boolean to Config. When true, GeneratorStart skips
      deleteGoFiles and reinitGoModule, and GeneratorStop skips cleanGoSources on the base
      branch. The generation branch is still created and tagged; measure and stitch cycles
      run normally; the merge proceeds. Only the source reset steps are omitted.
    benefits:
      - Repos where the Go source is the product (such as cobbler-scaffold itself) can use
        the generator lifecycle without destroying their library code
      - The flag is additive; all existing repos keep the default (false) and are unaffected
      - Library repos can run mage generator:run for autonomous task execution alongside
        the interactive /git-issue-pop workflow
    alternatives_rejected:
      - "Separate generator variant for library repos: duplicates the lifecycle logic"
      - "Configuring go_source_dirs as empty: deleteGoFiles still walks from root and deletes all .go files"

  - id: 10
    title: Two-path issue execution
    decision: |
      We support two complementary paths for executing a GitHub issue epic. The automated
      path (mage generator:start/run/stop) suits fully-specified work where Claude proposes
      and executes tasks autonomously. The interactive path (/git-issue-pop + /do-work) suits
      work where human review of the decomposition or intermediate results adds value.
    benefits:
      - Automated path maximizes throughput for well-understood tasks
      - Interactive path allows review and correction between sub-issues
      - Both paths use the same GitHub issue model and git worktree isolation, so switching
        between them requires no tooling changes
    alternatives_rejected:
      - "Single path only: automated path loses human review; interactive path loses throughput"

technology_choices:
  - component: Language
    technology: Go 1.25
    purpose: Library and consuming projects use Go
  - component: Build system
    technology: Magefile (magefile/mage)
    purpose: Orchestrator methods exposed as Mage targets
  - component: Version control
    technology: git (worktrees, tags, branches)
    purpose: Isolation, lifecycle tracking, and merge
  - component: Issue tracking
    technology: GitHub Issues (gh CLI)
    purpose: Task management via GitHub REST API; labels encode generation and status
  - component: AI execution
    technology: Claude Code (CLI)
    purpose: Code generation and task execution
  - component: Prompt templating
    technology: Go text/template
    purpose: Parameterized prompts with data injection
  - component: YAML parsing
    technology: gopkg.in/yaml.v3
    purpose: Configuration file parsing

project_structure:
  - path: go.mod
    role: Module definition (gopkg.in/yaml.v3)
  - path: pkg/orchestrator/
    role: Library package; all production code
  - path: pkg/orchestrator/orchestrator.go
    role: Orchestrator composition root — struct with 10 domain fields, New(), NewFromFile(), logging state, accessors
  - path: pkg/orchestrator/config.go
    role: Config struct, LoadConfig(), YAML parsing, defaults
  - path: pkg/orchestrator/cobbler.go
    role: ClaudeRunner struct — runClaude, token parsing, LOC capture, history, credentials
  - path: pkg/orchestrator/measure.go
    role: Measure struct — prompt, Claude, import
  - path: pkg/orchestrator/stitch.go
    role: Stitch struct — worktree, Claude, merge
  - path: pkg/orchestrator/generator.go
    role: Generator struct — generation lifecycle start/run/resume/stop/reset
  - path: pkg/orchestrator/commands.go
    role: Git, Go command wrappers
  - path: pkg/orchestrator/issues_gh.go
    role: GitHub Issues management — create, list, close, label, GC stale generation issues
  - path: pkg/orchestrator/stats.go
    role: Stats struct — LOC and documentation metrics
  - path: pkg/orchestrator/analyze.go
    role: Analyzer struct — cross-artifact consistency checking
  - path: pkg/orchestrator/scaffold.go
    role: Scaffolder struct — scaffold orchestrator into consuming projects
  - path: pkg/orchestrator/context.go
    role: ProjectContext assembly from docs, specs, source code
  - path: pkg/orchestrator/tag.go
    role: Versioned doc-release tagging
  - path: pkg/orchestrator/build.go
    role: Builder struct — Go build, lint, install, clean, credential extraction
  - path: pkg/orchestrator/vscode.go
    role: VsCode struct — VS Code extension build, package, install, uninstall
  - path: pkg/orchestrator/precycle.go
    role: Pre-cycle analysis — cross-artifact consistency check, code status, writes analysis.yaml to scratch directory before each cycle
  - path: pkg/orchestrator/constitution_md.go
    role: Constitution YAML to markdown conversion and ConstitutionPreviewFile helper
  - path: pkg/orchestrator/prompt.go
    role: Prompt document type aliases (MeasurePromptDoc, StitchPromptDoc) re-exported from internal/context
  - path: pkg/orchestrator/codestatus.go
    role: Code implementation status — scan tests/ for use-case test directories, compare roadmap spec status with test file presence, detect spec-vs-code gaps
  - path: pkg/orchestrator/compare.go
    role: Comparer struct — cross-generation differential comparison, binary resolution (prd004)
  - path: pkg/orchestrator/testloader.go
    role: Load CompareTestCase records from YAML test suite files and run them against both binaries (prd004)
  - path: pkg/orchestrator/outcomes.go
    role: Outcome trailer parsing — scan git history for task metrics (tokens, LOC, cost, duration)
  - path: pkg/orchestrator/prompt_files.go
    role: Context file enumeration — list files included in Claude prompts with sizes and token estimates
  - path: pkg/orchestrator/generator_stats.go
    role: Generation status report — issue table with status, release, cost, duration, turns, attempts, LOC deltas, parent measure per task; measure rows show task count and PRD refs; per-release task breakdown; PRD coverage table; requirements progress; shared helpers buildPRDReleaseMap, countTotalPRDRequirements, extractPRDRefs (stats:generator target)
  - path: pkg/orchestrator/release_stats.go
    role: Release statistics — per-release table with PRD counts (complete/started/untouched) and requirement totals sourced from road-map.yaml, PRD files, and use case touchpoints (stats:releases target)
  - path: pkg/orchestrator/run_stats.go
    role: Run statistics — RunStats() and CompareRunStats() delegate to internal/stats for aggregate per-generation-run reporting and side-by-side comparison (stats:run and stats:compare targets)
  - path: pkg/orchestrator/release.go
    role: Releaser struct — ReleaseUpdate/ReleaseClear for release lifecycle (release:update/clear targets)
  - path: pkg/orchestrator/token_stats.go
    role: Token statistics — enumerate context files by category with byte sizes, optional Anthropic Token Counting API for exact prompt token counts
  - path: pkg/orchestrator/internal/
    role: Internal packages — implementation extracted from top-level delegate files
  - path: pkg/orchestrator/internal/analysis/
    role: Cross-artifact consistency checking, code status, pre-cycle analysis, structured criteria types (AcceptanceCriterion, SuccessCriterion)
  - path: pkg/orchestrator/internal/build/
    role: Go build, scaffold
  - path: pkg/orchestrator/internal/claude/
    role: Claude invocation dispatch (CLI, SDK) and runner implementation
  - path: pkg/orchestrator/internal/compare/
    role: Differential comparison and test case loader
  - path: pkg/orchestrator/internal/context/
    role: ProjectContext assembly, prompt document types, constitution markdown, LoadPRDSemanticModel
  - path: pkg/orchestrator/internal/generate/
    role: Generation lifecycle, measure orchestration, stitch orchestration
  - path: pkg/orchestrator/internal/github/
    role: WorkTracker interface, GitHubTracker implementation, issue CRUD via gh CLI
  - path: pkg/orchestrator/internal/gitops/
    role: GitOps interface and ShellGitOps implementation for all git operations
  - path: pkg/orchestrator/internal/release/
    role: Release lifecycle (update/clear), tagging, version management
  - path: pkg/orchestrator/internal/stats/
    role: LOC metrics, generator stats, release stats, run stats, outcomes, token stats
  - path: pkg/orchestrator/internal/vscode/
    role: VS Code extension build, package, install
  - path: pkg/orchestrator/prompts/
    role: Embedded prompt templates (measure.tmpl, stitch.tmpl)
  - path: pkg/orchestrator/constitutions/
    role: Embedded constitutions (design.yaml, planning.yaml, execution.yaml, go-style.yaml, issue-format.yaml, testing.yaml, interface.yaml)
  - path: magefiles/
    role: Mage targets exposing orchestrator methods
  - path: vscode-extension/
    role: VS Code status dashboard (TypeScript)
  - path: docs/
    role: Documentation and specifications

implementation_status:
  current_focus: Active use — all components implemented and operational
  progress:
    - done: Generation lifecycle (start, run, resume, stop, reset, list, switch)
    - done: Measure and stitch workflows with full ProjectContext
    - done: Metrics collection and invocation records
    - done: Recovery from interrupted runs
    - done: Embedded prompt templates with override
    - done: Project scaffolding for consuming repos
    - done: Context assembly from docs, specs, source code, issues
    - done: History artifact saving (prompt, log, stats per invocation)
    - done: Phase-aware structured logging
    - done: Cross-artifact consistency analysis
