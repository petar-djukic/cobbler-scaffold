id: prd004-differential-comparison
title: Cross-Generation Differential Comparison

implemented_by:
  - Comparer
  - Binary Resolution

problem: |
  The orchestrator generates code across multiple generations, each tagged in git.
  Developers need to compare two generations against each other or against GNU
  reference binaries to detect regressions. The current test infrastructure
  compares a locally-built binary against a single GNU reference found on PATH,
  but cannot compare two arbitrary generations. Since generated code lives at git
  tags (generation-merged tags), the comparison tool must check out tags, build,
  and compare without requiring manual setup or environment variables.

goals:
  - G1: Define a BinaryResolver interface that abstracts binary resolution for any source (git tag, GNU reference, pre-built directory)
  - G2: Define a test case loader that reads inputs and expected outputs from YAML spec test suites
  - G3: Define a comparison runner that executes two binaries with identical inputs and reports differences
  - G4: Expose comparison through a mage target that accepts two tags and an optional utility filter

requirements:
  R1:
    title: BinaryResolver Interface
    items:
      - R1.1: We define a BinaryResolver interface with two methods — Resolve(utility string) returning a binary path, a cleanup function, and an error; and ListUtilities() returning the list of available utility names for that source
      - R1.2: The cleanup function must be idempotent and safe to call multiple times
      - R1.3: ResolverFromArg must select the correct resolver implementation based on the argument value; "gnu" returns GNUResolver, a path to an existing directory returns PathResolver, and anything else is treated as a git tag returning GitTagResolver

  R2:
    title: Git Tag Resolution
    items:
      - R2.1: GitTagResolver must create a temporary git worktree from the specified tag
      - R2.2: GitTagResolver must discover cmd/ packages in the worktree and build each with go build
      - R2.3: GitTagResolver must build binaries into a temporary directory, not into the worktree
      - R2.4: The cleanup function must remove both the worktree and the temporary build directory
      - R2.5: GitTagResolver must return an error if the tag does not exist or the build fails

  R3:
    title: GNU Reference Resolution
    items:
      - R3.1: GNUResolver must resolve Homebrew reference binaries via exec.LookPath
      - R3.2: Coreutils must use the g-prefix convention (cat resolves to gcat, wc resolves to gwc)
      - R3.3: Moreutils must use unprefixed names (ts resolves to ts, sponge resolves to sponge)
      - R3.4: GNUResolver must return an error if the binary is not found on PATH
      - R3.5: The cleanup function for GNUResolver must be a no-op
      - R3.6: GNUResolver.ListUtilities must scan the Homebrew coreutils gnubin directory and the moreutils utilities available on PATH

  R4:
    title: Path-Based Resolution
    items:
      - R4.1: PathResolver must resolve pre-built binaries from a local directory; given a utility name it returns the path to that binary in the directory
      - R4.2: PathResolver must return an error if the binary is not found in the directory
      - R4.3: The cleanup function for PathResolver must be a no-op
      - R4.4: PathResolver.ListUtilities must list all non-directory entries in the directory

  R5:
    title: Test Case Loading
    items:
      - R5.1: We define a CompareTestCase struct with fields for use_case, name, utility, stdin input, arguments, and expected outputs (stdout, stderr, exit_code)
      - R5.2: LoadCompareTestCases must read YAML test suite files matching test-*.yaml from the specs directory
      - R5.3: LoadCompareTestCases must filter to test cases that have concrete inputs and expected outputs, skipping entries that only reference Go test functions (go_test field only)
      - R5.4: FilterByUtility must return only test cases matching the specified utility name

  R6:
    title: Comparison Execution
    items:
      - R6.1: CompareUtility must run both binaries with identical inputs for each test case
      - R6.2: Comparison must be byte-for-byte on stdout; stderr and exit code are compared separately
      - R6.3: Each test case execution must enforce a timeout (default 10 seconds)
      - R6.4: We define a TestResult struct with utility name, test name, pass/fail status, and diffs for stdout, stderr, and exit code
      - R6.5: The comparison must collect all results before formatting output

  R7:
    title: Output and Mage Integration
    items:
      - R7.1: FormatResults must produce structured text output showing pass/fail per utility per test case with summary counts
      - R7.2: The Compare method on Orchestrator must accept two tag arguments and an optional utility filter
      - R7.3: The Compare method must discover utilities from both resolvers, intersect to find the common set, and compare each
      - R7.4: The Compare method must clean up all resolver resources via deferred cleanup calls
      - R7.5: The Compare method must return an error if any comparison test fails
      - R7.6: We expose a mage compare:run target that invokes the Compare method

non_goals:
  - This PRD does not define concurrent comparison execution (comparisons run sequentially per utility)
  - This PRD does not define test case authoring or test suite format changes (we consume existing test-rel*.yaml files)
  - This PRD does not define performance benchmarking between generations (we compare correctness only)

acceptance_criteria:
  - id: AC1
    criterion: mage compare:run builds binaries from two git tags and runs differential tests
    traces:
      - R1.1
      - R1.3
      - R2.1
      - R2.2
      - R2.3
      - R2.4
      - R2.5
      - R6.1
      - R6.2
      - R6.3
      - R6.4
      - R6.5
      - R7.2
      - R7.3
      - R7.4
      - R7.5
      - R7.6
  - id: AC2
    criterion: The gnu pseudo-tag resolves Homebrew reference binaries with correct prefix mapping
    traces:
      - R3.1
      - R3.2
      - R3.3
      - R3.4
      - R3.5
      - R3.6
  - id: AC3
    criterion: Test cases are sourced from YAML test suite specs, not from generated _test.go files
    traces:
      - R5.1
      - R5.2
      - R5.3
      - R5.4
  - id: AC4
    criterion: Structured output shows pass/fail per utility per test case with summary counts
    traces:
      - R7.1
  - id: AC5
    criterion: Worktrees and temporary directories are cleaned up after comparison
    traces:
      - R1.2
      - R2.4
      - R7.4
  - id: AC6
    criterion: A PathResolver allows comparison against pre-built binaries in a directory
    traces:
      - R4.1
      - R4.2
      - R4.3
      - R4.4
